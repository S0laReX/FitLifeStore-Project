<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitLife Store - Tu tienda fitness de confianza</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand" href="/" data-link><i class="fas fa-dumbbell"></i> FitLife Store</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item"><a class="nav-link" href="/" data-link>Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="/products" data-link>Productos</a></li>
          <li class="nav-item"><a class="nav-link" href="/contact" data-link>Contacto</a></li>
          <li class="nav-item ms-3">
            <button class="btn btn-light position-relative" onclick="toggleCart()">
              <i class="fas fa-shopping-cart"></i>
              <span class="cart-badge" id="cart-count">0</span>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- CONTENIDO DINÁMICO - AQUÍ SE CARGAN LAS PÁGINAS -->
  <main id="app">
    <!-- El contenido se carga aquí dinámicamente -->
  </main>

  <!-- CARRITO SIDEBAR -->
  <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
  <div class="cart-sidebar" id="cartSidebar">
    <div class="p-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3><i class="fas fa-shopping-cart"></i> Mi Carrito</h3>
        <button class="btn btn-close" onclick="toggleCart()"></button>
      </div>
      <div id="cart-items"></div>
      <div class="mt-4 pt-4 border-top">
        <h4>Total: $<span id="cart-total">0.00</span></h4>
        <button class="btn btn-primary w-100 mt-3" onclick="checkout()">
          <i class="fas fa-credit-card"></i> Proceder al Pago
        </button>
        <button class="btn btn-outline-danger w-100 mt-2" onclick="clearCart()">
          <i class="fas fa-trash"></i> Vaciar Carrito
        </button>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="container">
      <div class="row">
        <div class="col-md-4 mb-3">
          <h5><i class="fas fa-dumbbell"></i> FitLife Store</h5>
          <p>Tu aliado en el camino hacia una vida más saludable y activa. Y para no tener diabetes.</p>
        </div>
        <div class="col-md-4 mb-3">
          <h5>Enlaces Rápidos</h5>
          <ul class="list-unstyled">
            <li><a href="/" data-link class="text-white-50">Inicio</a></li>
            <li><a href="/products" data-link class="text-white-50">Productos</a></li>
            <li><a href="/contact" data-link class="text-white-50">Contacto</a></li>
          </ul>
        </div>
        <div class="col-md-4 mb-3">
          <h5>Síguenos</h5>
          <div class="social-links">
            <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://tiktok.com" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="https://wa.me/59176543210" target="_blank"><i class="fab fa-whatsapp"></i></a>
          </div>
        </div>
      </div>
      <hr class="border-secondary">
      <p class="text-center mb-0">© 2025 FitLife Store - Todos los derechos reservados</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
